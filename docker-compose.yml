services:
  homelab-docs:
    build: .
    container_name: homelab-docs
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "8110:8110"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
    environment:
      - PORT=8110
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8110/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
